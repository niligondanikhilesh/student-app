apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: student-app
  template:
    metadata:
      labels:
        app: student-app
    spec:
      containers:
      - name: student-app
        image: niknilig/student-app
        ports:
        - containerPort: 5000
